<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenantFlow | Resident Portal</title>
    <!-- TAILWIND CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .section { transition: all 0.3s ease; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

<!-- LOGIN SECTION -->
<div id="loginSection" class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-700 to-indigo-900 px-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-blue-600">TenantFlow</h1>
            <p class="text-slate-500 text-sm">Resident Access Portal</p>
        </div>
        <h2 class="text-xl font-bold mb-4">Welcome Back</h2>
        <input type="text" id="username" placeholder="Full Name" class="border border-slate-200 p-4 w-full rounded-2xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        <button onclick="login()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl w-full shadow-lg shadow-blue-200 transition-all">Enter Portal</button>
    </div>
</div>

<!-- MAIN APP INTERFACE -->
<div id="app" class="hidden">
    <!-- NAVIGATION -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tight text-blue-600">TenantFlow</h1>

            <div class="hidden md:flex space-x-6">
                <button onclick="showSection('dashboard')" class="text-sm font-bold text-slate-600 hover:text-blue-600">Home</button>
                <button onclick="showSection('my-receipts')" class="text-sm font-bold text-slate-600 hover:text-blue-600">Receipts</button>
                <button onclick="showSection('messages')" class="text-sm font-bold text-slate-600 hover:text-blue-600">Memos</button>
                <button onclick="showSection('search')" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">Find Houses</button>
            </div>

            <button onclick="logout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl hover:bg-red-100 transition-all">Logout</button>
        </div>
    </nav>

    <main class="p-6 max-w-5xl mx-auto">
        <!-- DASHBOARD -->
        <div id="dashboard" class="section space-y-6">
            <div id="reminder" class="hidden"></div>
            
            <header>
                <h2 class="text-3xl font-black">Dashboard</h2>
                <p class="text-slate-500 text-sm">Overview of your current utility status</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Status Cards -->
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rent Bill</span>
                    <p id="rentStatus" class="text-2xl font-black my-2">---</p>
                    <button onclick="payBill('rent')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-2xl text-sm font-bold hover:bg-blue-600 transition-all">Pay $500</button>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Water Bill</span>
                    <p id="waterStatus" class="text-2xl font-black my-2">---</p>
                    <button onclick="payBill('water')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-2xl text-sm font-bold hover:bg-blue-600 transition-all">Pay $50</button>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Electricity Bill</span>
                    <p id="electricityStatus" class="text-2xl font-black my-2">---</p>
                    <button onclick="payBill('electricity')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-2xl text-sm font-bold hover:bg-blue-600 transition-all">Pay $50</button>
                </div>
            </div>
        </div>

        <!-- RECEIPTS -->
        <div id="my-receipts" class="section hidden">
            <h2 class="text-3xl font-black mb-6">Receipt History</h2>
            <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                <ul id="receiptList" class="divide-y divide-slate-50"></ul>
            </div>
        </div>

        <!-- MEMOS -->
        <div id="messages" class="section hidden">
            <h2 class="text-3xl font-black mb-6">Announcements</h2>
            <ul id="memoList" class="space-y-4"></ul>
        </div>

        <!-- SEARCH -->
        <div id="search" class="section hidden space-y-8">
            <header>
                <h2 class="text-3xl font-black">Marketplace</h2>
                <p class="text-slate-500">Find your next home with our real-time listings</p>
            </header>

            <form id="searchForm" class="flex flex-wrap gap-4 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <input type="text" id="searchInput" placeholder="Enter city (e.g. New York)" class="flex-1 min-w-[200px] bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button type="submit" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">Search Houses</button>
            </form>

            <div id="searchResult" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>
</div>

<script src="SCRIPT.JS"></script>
</body>
</html>
