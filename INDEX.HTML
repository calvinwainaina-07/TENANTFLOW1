<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenantFlow | Resident Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- Login Section -->
<div id="loginSection" class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-600 to-indigo-800">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm transform transition hover:scale-[1.02]">
        <div class="flex justify-center mb-6">
            <div class="bg-blue-100 p-4 rounded-2xl text-blue-600 text-3xl">🏠</div>
        </div>
        <h2 class="text-3xl font-black text-center mb-2 text-slate-800">Welcome</h2>
        <p class="text-slate-500 text-center mb-8">Log in to manage your apartment</p>
        
        <input type="text" id="username" placeholder="Full Name" class="border-2 border-slate-100 p-4 w-full rounded-2xl mb-4 outline-none focus:border-blue-400 transition-all">
        <button onclick="login()" class="bg-blue-600 text-white font-bold py-4 rounded-2xl w-full hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">Enter Portal</button>
    </div>
</div>

<div id="app" class="hidden">
    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xs uppercase tracking-widest">TF</span>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">TenantFlow</h1>
            </div>
            <div class="hidden md:flex space-x-1">
                <button onclick="showSection('dashboard')" class="px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-100 font-medium transition">Home</button>
                <button onclick="showSection('my-receipts')" class="px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-100 font-medium transition">Receipts</button>
                <button onclick="showSection('messages')" class="px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-100 font-medium transition">Memos</button>
            </div>
            <button onclick="logout()" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl font-bold hover:bg-rose-100 transition text-sm">Vacate</button>
        </div>
    </nav>

    <!-- Content Area -->
    <div class="p-6 max-w-4xl mx-auto space-y-8">
        
        <!-- DASHBOARD -->
        <div id="dashboard" class="section space-y-6">
            <header>
                <h2 class="text-3xl font-black text-slate-800">My Dashboard</h2>
                <p id="reminder" class="text-slate-500 mt-1"></p>
            </header>

            <div class="grid gap-4">
                <!-- Rent Card -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-blue-300 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl text-xl">🏛️</div>
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">House Rent</p>
                            <span id="rentStatus" class="font-black text-rose-500">UNPAID</span>
                        </div>
                    </div>
                    <button onclick="payBill('rent')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-600 transition shadow-md active:scale-95">Pay $500</button>
                </div>

                <!-- Water Card -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-cyan-300 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="bg-cyan-50 text-cyan-600 p-4 rounded-2xl text-xl">💧</div>
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Water Utility</p>
                            <span id="waterStatus" class="font-black text-rose-500">UNPAID</span>
                        </div>
                    </div>
                    <button onclick="payBill('water')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-cyan-600 transition shadow-md active:scale-95">Pay $30</button>
                </div>

                <!-- Electricity Card -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-amber-300 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="bg-amber-50 text-amber-600 p-4 rounded-2xl text-xl">⚡</div>
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Electricity</p>
                            <span id="electricityStatus" class="font-black text-rose-500">UNPAID</span>
                        </div>
                    </div>
                    <button onclick="payBill('electricity')" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-amber-600 transition shadow-md active:scale-95">Pay $75</button>
                </div>
            </div>
        </div>

        <!-- RECEIPTS -->
        <div id="my-receipts" class="section hidden space-y-6">
            <h2 class="text-3xl font-black text-slate-800">Payment History</h2>
            <ul id="receiptList" class="space-y-3"></ul>
        </div>

        <!-- MESSAGES -->
        <div id="messages" class="section hidden space-y-6">
            <h2 class="text-3xl font-black text-slate-800">Memos & Announcements</h2>
            <ul id="memoList" class="space-y-4"></ul>
        </div>

    </div>
</div>

<script src="SCRIPT.JS"></script>
</body>
</html>
